<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Come Bark at Sonne!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.cdnfonts.com/" crossorigin="">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/the-bubble-letters" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Come Bark at Sonne!</h1>
      <p>Pick a voice, preview it, then write what you want to say!</p>
      <p>Click and copy into Twitch chat to trigger TTS on stream.</p>
    </header>

    <div class="panel">
      <p class="panel-label">01 — voice</p>
      <div id="voice-grid"></div>
    </div>

    <div class="panel">
      <p class="panel-label">02 — preview and text</p>
      <div class="controls-row">
        <button class="primary" id="preview-btn">▶ Preview voice</button>
        <div class="vu" id="vu"><span></span><span></span><span></span><span></span><span></span></div>
      </div>
      <textarea id="text-input" maxlength="200" placeholder="Enter your text here!" style="margin-top:14px;"></textarea>
      <div class="row-between">
        <span class="charcount" id="charcount"></span>
      </div>
    </div>

    <div class="panel">
      <p class="panel-label">03 — copy to chat</p>
      <div class="output-panel" id="output-panel" tabindex="0" role="button" aria-label="Copy chat command">
        <span class="cmd" id="cmd-text"></span>
        <span class="copy-hint" id="copy-hint">click to copy</span>
      </div>
      <details hidden>
        <summary>Command format</summary>
        <div class="format-row">
          <input type="text" id="format-input" value="cheer{cheerAmount} [{voice}:v2] {text}" spellcheck="false">
        </div>
      </details>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
